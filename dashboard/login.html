<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Project Carb — Sign In</title>
<link rel="stylesheet" href="shared.css">
<style>
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;}
  .login-card{
    width:360px;max-width:92vw;background:#fff;
    border:1px solid var(--border);border-radius:14px;
    padding:32px;box-shadow:0 8px 30px rgba(0,0,0,0.07);
  }
  .login-brand{
    font-size:20px;font-weight:700;letter-spacing:-0.4px;
    color:var(--accent);text-align:center;margin-bottom:6px;
  }
  .login-sub{
    font-size:12px;color:var(--text-3);text-align:center;margin-bottom:24px;
  }
  .login-field{margin-bottom:14px;}
  .login-field label{
    display:block;font-size:11px;font-weight:600;
    text-transform:uppercase;letter-spacing:0.3px;
    color:var(--gold);margin-bottom:5px;
  }
  .login-error{
    font-size:12px;color:var(--red);text-align:center;
    margin-bottom:12px;min-height:18px;
  }
  .login-actions{display:flex;gap:8px;margin-top:20px;}
  .login-actions .btn{flex:1;justify-content:center;padding:9px 0;font-size:13px;}
  .login-toggle{
    font-size:12px;color:var(--text-3);text-align:center;
    margin-top:16px;cursor:pointer;transition:color 120ms;
  }
  .login-toggle:hover{color:var(--accent);}
  .login-toggle span{color:var(--accent);font-weight:600;}
  .login-role-note{
    font-size:11px;color:var(--text-4);text-align:center;
    margin-top:8px;font-style:italic;
  }
</style>
</head>
<body>

<div class="login-card">
  <div class="login-brand">project carb</div>
  <div class="login-sub" data-sub>Sign in to your workspace</div>

  <div class="login-error" data-error></div>

  <div class="login-field" data-name-field>
    <label>Your Crab</label>
    <input data-name placeholder="Your name" autocomplete="off">
  </div>
  <div class="login-field" data-assigned-field style="display:none;">
    <label>You Are</label>
    <div data-assigned-name style="font-size:16px;font-weight:700;color:var(--accent);padding:8px 0;"></div>
  </div>
  <div class="login-field">
    <label>Password</label>
    <input type="password" data-password placeholder="Password">
  </div>

  <div class="login-actions">
    <button class="btn btn-add" data-submit>Sign In</button>
  </div>

  <div class="login-toggle" data-toggle>
    Don't have an account? <span>Sign up</span>
  </div>
  <div class="login-role-note" data-role-note></div>
</div>

<script type="module">
import { signup, login, currentUser, getUsers, assignCrabName } from './auth.js';
import { get, put } from './store.js';

// migrate old "X Crab" names
if (!get('crab_migrated', false)) {
  const users = getUsers();
  if (users.length) {
    users.forEach(u => { u.name = u.name.replace(/ Crab$/, ''); });
    put('users', users);
  }
  put('crab_migrated', true);
}

if (currentUser()) {
  window.location.href = 'index.html';
}

let mode = 'login';
let pendingCrab = null;

const nameField = document.querySelector('[data-name-field]');
const nameInput = document.querySelector('[data-name]');
const assignedField = document.querySelector('[data-assigned-field]');
const assignedName = document.querySelector('[data-assigned-name]');
const passInput = document.querySelector('[data-password]');
const errorEl = document.querySelector('[data-error]');
const submitBtn = document.querySelector('[data-submit]');
const toggleEl = document.querySelector('[data-toggle]');
const subEl = document.querySelector('[data-sub]');
const roleNote = document.querySelector('[data-role-note]');

function updateUI() {
  if (mode === 'login') {
    nameField.style.display = '';
    assignedField.style.display = 'none';
    submitBtn.textContent = 'Sign In';
    subEl.textContent = 'Sign in to your workspace';
    toggleEl.innerHTML = "Don't have an account? <span>Sign up</span>";
    roleNote.textContent = '';
    pendingCrab = null;
  } else {
    pendingCrab = assignCrabName();
    nameField.style.display = 'none';
    assignedField.style.display = '';
    assignedName.textContent = pendingCrab;
    submitBtn.textContent = 'Create Account';
    subEl.textContent = 'You have been assigned';
    toggleEl.innerHTML = "Already have an account? <span>Sign in</span>";
    roleNote.textContent = getUsers().length === 0
      ? 'First account becomes Superadmin'
      : 'You will join as a Member';
  }
  errorEl.textContent = '';
}

toggleEl.addEventListener('click', () => {
  mode = mode === 'login' ? 'signup' : 'login';
  updateUI();
});

function submit() {
  const pass = passInput.value;
  if (mode === 'login') {
    const name = nameInput.value.trim();
    if (!name || !pass) { errorEl.textContent = 'Name and password required'; return; }
    const result = login(name, pass);
    if (!result.ok) { errorEl.textContent = result.error; return; }
  } else {
    if (!pass) { errorEl.textContent = 'Set a password'; return; }
    const result = signup(pass);
    if (!result.ok) { errorEl.textContent = result.error; return; }
  }
  window.location.href = 'index.html';
}

submitBtn.addEventListener('click', submit);
passInput.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') passInput.focus(); });

updateUI();
</script>
</body>
</html>
